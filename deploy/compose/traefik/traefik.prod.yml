api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    # TLS: default certificate from file provider (Cloudflare Origin CA; see dynamic.prod.yml)

providers:
  docker:
    exposedByDefault: false
    network: poe2b_edge
  file:
    filename: /etc/traefik/dynamic.prod.yml
    watch: true

log:
  level: INFO
  format: json

accessLog:
  format: json
  bufferingSize: 100
