# UAT: Cloudflare Origin CA + static routes (file provider, no Docker socket in Traefik).
# List every Host you use in DNS and on the origin certificate.
#
# Do not use a single rule with "||" — some Traefik+yaml combinations parse it poorly.
# app: /api* → FastAPI, /* → static SPA (same origin).

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /certs/cloudflare-origin.pem
        keyFile: /certs/cloudflare-origin.key

http:
  routers:
    uat-app-api-01:
      rule: Host(`app.uat.hideoutbutler.com`) && PathPrefix(`/api`)
      entryPoints: [websecure]
      service: uat-app-api
      priority: 100
    uat-app-api-02:
      rule: Host(`app.hideoutbutler.com`) && PathPrefix(`/api`)
      entryPoints: [websecure]
      service: uat-app-api
      priority: 100
    uat-app-api-03:
      rule: Host(`hideoutbutler.com`) && PathPrefix(`/api`)
      entryPoints: [websecure]
      service: uat-app-api
      priority: 100
    uat-app-api-04:
      rule: Host(`www.hideoutbutler.com`) && PathPrefix(`/api`)
      entryPoints: [websecure]
      service: uat-app-api
      priority: 100

    uat-app-spa-01:
      rule: Host(`app.uat.hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-app-frontend
      priority: 1
    uat-app-spa-02:
      rule: Host(`app.hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-app-frontend
      priority: 1
    uat-app-spa-03:
      rule: Host(`hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-app-frontend
      priority: 1
    uat-app-spa-04:
      rule: Host(`www.hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-app-frontend
      priority: 1

    uat-ggg-01:
      rule: Host(`ggg.uat.hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-mockggg
    uat-ggg-02:
      rule: Host(`ggg.hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-mockggg

    uat-admin-01:
      rule: Host(`admin.uat.hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-admin
    uat-admin-02:
      rule: Host(`admin.hideoutbutler.com`)
      entryPoints: [websecure]
      service: uat-admin

  services:
    uat-app-api:
      loadBalancer:
        servers:
          - url: http://backend:8000
    uat-app-frontend:
      loadBalancer:
        servers:
          - url: http://frontend:80
    uat-mockggg:
      loadBalancer:
        servers:
          - url: http://mock-ggg:9000
    uat-admin:
      loadBalancer:
        servers:
          - url: http://admin:8001
