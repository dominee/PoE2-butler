# UAT: TLS (Cloudflare Origin CA) + static routes for mock-ggg + path-split app host.
# Add every hostname you use in DNS/Cloudflare to the Origin certificate SANs
# (e.g. one cert with app.uat, ggg.uat, admin.uat and/or the prod-style names below).
#
# Host rules: match BOTH common patterns so a VM with DNS pointing at
#   app.uat… / ggg.uat… / admin.uat…
# and a VM that reuses
#   app. / ggg. / admin.hideoutbutler.com
# both work. If 404, confirm `docker exec … traefik` sees this file and reload.
#
# app: /api* → FastAPI, /* → static SPA (same origin for /api and OAuth callback).

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /certs/cloudflare-origin.pem
        keyFile: /certs/cloudflare-origin.key

http:
  routers:
    uat-app-api:
      rule: (Host(`app.uat.hideoutbutler.com`) || Host(`app.hideoutbutler.com`)) && PathPrefix(`/api`)
      entryPoints:
        - websecure
      service: uat-app-api
      priority: 100
    uat-app:
      rule: Host(`app.uat.hideoutbutler.com`) || Host(`app.hideoutbutler.com`)
      entryPoints:
        - websecure
      service: uat-app-frontend
      priority: 1
    uat-ggg:
      rule: Host(`ggg.uat.hideoutbutler.com`) || Host(`ggg.hideoutbutler.com`)
      entryPoints:
        - websecure
      service: uat-mockggg
    uat-admin:
      rule: Host(`admin.uat.hideoutbutler.com`) || Host(`admin.hideoutbutler.com`)
      entryPoints:
        - websecure
      service: uat-admin

  services:
    uat-app-api:
      loadBalancer:
        servers:
          - url: http://backend:8000
    uat-app-frontend:
      loadBalancer:
        servers:
          - url: http://frontend:80
    uat-mockggg:
      loadBalancer:
        servers:
          - url: http://mock-ggg:9000
    uat-admin:
      loadBalancer:
        servers:
          - url: http://admin:8001
