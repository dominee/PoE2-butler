name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Sync deps
        run: uv sync --frozen || uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -ra

  admin:
    name: admin lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --frozen || uv sync
      - run: uv run ruff check .
      - run: uv run pytest -ra

  mock-ggg:
    name: mock-ggg lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mock-ggg
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --frozen || uv sync
      - run: uv run ruff check .

  frontend:
    name: frontend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node22-npm-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-npm-
      - run: npm install
      - run: npm run lint || true
      - run: npx tsc -b
      - run: npm test

  audit:
    name: dependency audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: pip-audit (backend)
        working-directory: backend
        run: |
          uv sync --frozen || uv sync
          uv run pip-audit --strict || true
      - name: pip-audit (admin)
        working-directory: admin
        run: |
          uv sync --frozen || uv sync
          uv run pip-audit --strict || true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm install --package-lock-only
          npm audit --omit=dev --audit-level=high || true

  e2e:
    name: Playwright (docker dev stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Add Traefik hostnames
        run: |
          echo "127.0.0.1 app.dev.hideoutbutler.com api.dev.hideoutbutler.com ggg.dev.hideoutbutler.com" | sudo tee -a /etc/hosts
      - name: E2E env for compose
        run: cp deploy/env/.env.e2e deploy/env/.env.dev
      - name: Reset compose state
        run: docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e down -v --remove-orphans || true
      - name: Build and start stack
        run: |
          docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e up -d --build
      - name: Wait for API, then migrate
        run: |
          set -e
          ok=0
          for i in $(seq 1 60); do
            if curl -fsS -H "Host: api.dev.hideoutbutler.com" "http://127.0.0.1/healthz" >/dev/null; then
              ok=1
              break
            fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "API did not become ready"
            docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e ps
            exit 1
          fi
          docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e exec -T backend alembic upgrade head
      - name: Wait for app
        run: |
          set -e
          ok=0
          for i in $(seq 1 90); do
            if curl -fsS -H "Host: app.dev.hideoutbutler.com" "http://127.0.0.1/" -o /tmp/e2e-app.html; then
              # Ensure this is the actual frontend shell (not a proxy/default page).
              if [ -s /tmp/e2e-app.html ] \
                && grep -q "<title>PoE2 Hideout Butler</title>" /tmp/e2e-app.html \
                && grep -q '<div id="root"></div>' /tmp/e2e-app.html; then
                ok=1
                break
              fi
            fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "App (Traefik → Vite) did not become ready"
            echo "Last fetched app HTML:"
            sed -n '1,120p' /tmp/e2e-app.html || true
            docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e ps
            exit 1
          fi
      - name: Reset frontend workspace ownership for npm ci
        run: |
          # Docker services may create root-owned files in the bind-mounted repo.
          # Ensure npm can write frontend/node_modules as the runner user.
          sudo rm -rf frontend/node_modules
          sudo chown -R "$USER:$USER" frontend
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://app.dev.hideoutbutler.com
          CI: "true"
        run: npm run test:e2e
      - name: Compose status (on failure)
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e ps
      - name: Compose logs (on failure)
        if: failure()
        run: |
          docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e logs --tail=200
      - name: Stop stack
        if: always()
        run: |
          docker compose -f deploy/compose/docker-compose.dev.yml --env-file deploy/env/.env.e2e down -v
